meta:
  environment: docker
  toolchain:
    name: docker
    version: latest

build:
  dockerfile: Dockerfile
  skip: false

run:
  persistenceMount: /data
  containerPort: 8080
  env:
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:8080
    ConnectionStrings__DefaultConnection: Data Source=/data/pfn.db;Cache=Shared
    DatabaseIntegration__SeedDemoData: "true"
